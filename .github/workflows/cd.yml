# .github/workflows/cd.yml
name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  deploy:
    name: Deploy to Azure Container Apps
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Log in to Azure (CLI)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Developer CLI
        run: azd auth login --client-id "$AZURE_CLIENT_ID" --federated-credential-provider "github" --tenant-id "$AZURE_TENANT_ID"
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Configure azd environment
        env:
          AZURE_GATEWAY_SECRET: ${{ secrets.AZURE_GATEWAY_SECRET }}
          AZURE_JWT_SIGNING_KEY: ${{ secrets.AZURE_JWT_SIGNING_KEY }}
          AZURE_MESSAGING_PASSWORD: ${{ secrets.AZURE_MESSAGING_PASSWORD }}
          ALERT_EMAIL_ADDRESS: ${{ vars.ALERT_EMAIL_ADDRESS }}
        run: |
          azd env new "$AZURE_ENV_NAME" --no-prompt || true
          azd env select "$AZURE_ENV_NAME"
          # Bicep parameters for azd provision (main.parameters.json ${VAR} interpolation)
          azd env set AZURE_GATEWAY_SECRET "$AZURE_GATEWAY_SECRET"
          azd env set AZURE_JWT_SIGNING_KEY "$AZURE_JWT_SIGNING_KEY"
          azd env set AZURE_MESSAGING_PASSWORD "$AZURE_MESSAGING_PASSWORD"
          VERSION=${GITHUB_SHA::8}
          azd env set OTEL_SERVICE_VERSION "$VERSION"
          azd env set ALERT_EMAIL_ADDRESS "$ALERT_EMAIL_ADDRESS"

      - name: Provision Infrastructure
        run: azd provision --no-prompt

      - name: Deploy Application
        env:
          # AZD_INITIAL_ENVIRONMENT_CONFIG provides Aspire securedParameter values
          # for azd deploy. Parameter names must match AddParameter() in AppHost.cs.
          # See: https://github.com/dotnet/aspire/discussions/4083
          AZURE_GATEWAY_SECRET: ${{ secrets.AZURE_GATEWAY_SECRET }}
          AZURE_JWT_SIGNING_KEY: ${{ secrets.AZURE_JWT_SIGNING_KEY }}
          AZURE_MESSAGING_PASSWORD: ${{ secrets.AZURE_MESSAGING_PASSWORD }}
        run: |
          export AZD_INITIAL_ENVIRONMENT_CONFIG=$(jq -n \
            --arg gs "$AZURE_GATEWAY_SECRET" \
            --arg jk "$AZURE_JWT_SIGNING_KEY" \
            --arg mp "$AZURE_MESSAGING_PASSWORD" \
            '{"infra":{"parameters":{"gateway-secret":$gs,"jwt-signing-key":$jk,"messaging-password":$mp}}}')
          azd deploy --no-prompt 2>&1 || DEPLOY_FAILED=true

          if [ "$DEPLOY_FAILED" = "true" ]; then
            echo "::warning::azd deploy partially failed — applying identity fallback"
            RG="rg-${AZURE_ENV_NAME}"
            REGISTRY=$(az containerapp show -n gateway -g "$RG" \
              --query 'properties.configuration.registries[0].server' -o tsv)
            REPO="cashflow/identity-${AZURE_ENV_NAME}"
            TAG=$(az acr repository show-tags -n "${REGISTRY%%.*}" \
              --repository "$REPO" --orderby time_desc --top 1 -o tsv)
            IMAGE="${REGISTRY}/${REPO}:${TAG}"
            echo "Deploying identity with image: $IMAGE"
            az containerapp secret set -n identity -g "$RG" \
              --secrets "gateway--secret=$AZURE_GATEWAY_SECRET" \
                        "jwt--signingkey=$AZURE_JWT_SIGNING_KEY"
            az containerapp update -n identity -g "$RG" --image "$IMAGE"
            echo "Identity deployed via az CLI fallback"
          fi
